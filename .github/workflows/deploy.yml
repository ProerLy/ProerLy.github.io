# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  # 在 master 分支有 push 或手动触发时运行
  push:
    branches: [master]
  workflow_dispatch:

# 授予 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许取消正在进行的相同工作流
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录以支持 last-updated

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build VitePress site
        run: |
          # 显式指定配置路径，避免歧义
          npx vitepress build docs --config docs/vitepress/config.mts || \
          npx vitepress build docs --config docs/.vitepress/config.mts

      - name: Copy dist to root
        run: |
          mkdir -p temp-dist
          cp -r docs/.vitepress/dist/* temp-dist/ || cp -r docs/vitepress/dist/* temp-dist/
          rm -f *.html *.css *.js && cp -r temp-dist/* .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ # 上传整个根目录，因为 User Site 必须从此处提供服务

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
